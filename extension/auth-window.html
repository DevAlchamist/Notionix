<!doctype html>
<html lang="en">
  <head>

    <title>Sign in — Notionix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        margin: 0;

        min-width: 320px;
